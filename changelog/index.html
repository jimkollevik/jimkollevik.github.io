<!DOCTYPE html>
<html>
<head>
	<title>Jim Kollevik: Changelog</title>
	<link id="favicon" rel="shortcut icon" type="image/png" href="favicon.png" />
	<meta charset="utf-8">
	<meta content="">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap" rel="stylesheet"> 
	<link rel="stylesheet" type="text/css" href="../default.css">
	<script type="text/javascript" src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
	
	<style type="text/css">
		body {
		 background-color:#000000 !important;
		color: #ffffff !important;
		}
	</style>
</head>
<body>

<div class="wrapper">
	<div class="col headline">
		<h4>Headline</h4>
	</div><!-- end col -->
	<div class="col msg">
		<h4>Message</h4>
	</div><!-- end col -->
	<div class="col date">
		<h4>Change date</h4>
	</div><!-- end col -->
</div><!-- end wrapper -->

<script type="text/javascript">
	console.log("Log changes: ")
	var uri ="https://api.github.com/repos/jimkollevik/jimkollevik.github.io/commits";
		$.getJSON(uri, function(data) {
			for (var i=0; i<100; i++) {
        var headline = data[i].commit.message;
	var trimHeadline = headline.split("\n\n");
	var getHeadline = trimHeadline[0];
	var msg = data[i].commit.message;
	var trimMsg = msg.split('\n\n').pop();
	var date = data[i].commit.committer.date;
	var trimDate = date.substring(0,10);
	 if (typeof getHeadline === 'string' && getHeadline.length === 0) {
  	$(".headline").append("<p>" + N/A +"</p>");
	} else {
  	$(".headline").append("<p>" + getHeadline +"</p>");
	}
          $(".msg").append("<p>" + trimMsg + "</p>");
	$(".date").append("<p>" + trimDate + "</p>");
			}
		});
</script>
</body>
</html>
